# Triggered by ChemKED-database after a PR is merged into main/master.
# Pulls the latest ChemKED-database repo and syncs the newly merged
# files into the Django database via sync_chemked.

name: ChemKED DB Ingest

on:
  repository_dispatch:
    types: [chemked-ingest]

jobs:
  ingest:
    name: Sync Merged Files to DB
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout kineticmodelssite
        uses: actions/checkout@v4

      - name: Restore runner .env
        run: |
          ENV_SRC="$HOME/Documents/CoMoChEng/actions-runner/.runner-config/kms.env"
          if [ -f "$ENV_SRC" ]; then
            cp "$ENV_SRC" "${{ github.workspace }}/.env"
          else
            echo "WARNING: $ENV_SRC not found — DB credentials missing"
          fi

      - name: Pull latest ChemKED-database
        run: |
          eval "$(conda shell.bash hook)"
          conda activate kms
          cd ${{ github.workspace }}
          # Resolve CHEMKED_DATABASE_PATH from Django settings
          CHEMKED_PATH=$(python -c "
          import django, os, sys
          os.environ.setdefault('DJANGO_SETTINGS_MODULE', 'kineticmodelssite.settings')
          django.setup()
          from django.conf import settings
          path = getattr(settings, 'CHEMKED_DATABASE_PATH', None)
          if not path:
              sys.exit('CHEMKED_DATABASE_PATH not set in Django settings')
          print(path)
          ")
          echo "CHEMKED_PATH=$CHEMKED_PATH" >> "$GITHUB_ENV"
          git -C "$CHEMKED_PATH" pull --ff-only

      - name: Sync merged files to database
        run: |
          eval "$(conda shell.bash hook)"
          conda activate kms
          cd ${{ github.workspace }}

          FILES='${{ toJson(github.event.client_payload.files) }}'
          echo "Files to ingest: $FILES"

          # Build --files arguments from the JSON array
          FILE_ARGS=$(echo "$FILES" | python3 -c "
          import sys, json
          files = json.load(sys.stdin)
          print(' '.join(files))
          ")

          if [ -z "$FILE_ARGS" ]; then
            echo "No files to ingest."
            exit 0
          fi

          python manage.py sync_chemked \
            --path "$CHEMKED_PATH" \
            --files $FILE_ARGS
